<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Dorisben Academy — Class Records</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  :root{
    --ink:#1a1f2b;
    --muted:#6b7280;
    --line:#e6e8ec;
    --bg:#f6f7f9;
    --panel:#ffffff;
    --brand:#1f4ea3;
    --brand-soft:#eef3fb;
    --ok:#10806a;
    --warn:#b4540a;
    --danger:#b42318;
    --radius:10px;
    --shadow:0 1px 2px rgba(16,24,40,.05), 0 1px 3px rgba(16,24,40,.06);
    /* --- Design system ---
       One deliberate scale, used everywhere, so every screen shares the same
       rhythm. Radii step cleanly; type follows a modular scale; spacing is on
       a 4px grid. Header cards (hero, band, school/class) draw from --card-*. */
    --r-xs:6px;    --r-sm:8px;   --r-md:10px;  --r-lg:14px;  --r-pill:999px;
    --t-xs:11px;   --t-sm:12.5px; --t-base:14px; --t-md:16px; --t-lg:19px; --t-xl:22px; --t-2xl:26px;
    --card-pad:16px;
    --card-radius:14px;
    --card-gap:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;max-width:100%;overflow-x:hidden;overflow-x:clip}
  /* Nothing may push the layout wider than the screen. Wide content (score grid,
     report card) scrolls inside its own frame via .sub-scroll. */
  img,svg,video,canvas,table{max-width:100%}
  #root{max-width:100vw;overflow-x:clip}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    text-rendering:optimizeLegibility;
    line-height:1.5;
  }
  a{color:var(--brand)}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  .topbar{
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(10px);
    backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;
  }
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;min-height:62px;flex-wrap:wrap;row-gap:2px;padding-top:8px;padding-bottom:8px}
  .topbar-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:16px;letter-spacing:-.02em}
  .brand .mark{
    width:40px;height:40px;
    display:grid;place-items:center;
  }
  .brand .mark img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.02em}
  .role-pill{
    font-size:12px;font-weight:600;color:var(--brand);
    background:var(--brand-soft);padding:5px 11px;border-radius:var(--r-pill);
  }
  .master-switch{
    width:auto;font-size:12.5px;font-weight:600;color:var(--ink);
    padding:6px 28px 6px 10px;border-radius:var(--r-sm);border:1px solid var(--line);
    background:#fff;cursor:pointer;
  }
  .btn{
    font:inherit;font-weight:600;font-size:13px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:8px 14px;border-radius:var(--r-sm);transition:.12s;
  }
  .btn:hover{border-color:#cfd4dc}
  .btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn-primary:hover{background:#1a428c;border-color:#1a428c}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
  .btn-ghost:hover{color:var(--ink);background:#f0f1f3}
  /* Destructive buttons (Delete, Remove photo): solid red so they're easy to
     spot at a glance. When pressed/selected they flip to a white button with
     yellow text, signalling the action is highlighted before it commits. */
  .btn-danger{color:#fff;background:var(--danger);border-color:var(--danger);font-weight:600}
  .btn-danger:hover{background:#9a1d13;border-color:#9a1d13;color:#fff}
  .btn-danger:active,
  .btn-danger:focus{background:#fff;border-color:#e6a700;color:#e6a700;outline:none}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-block{width:100%;justify-content:center;padding:11px 14px;font-size:14px}
  input,select,textarea{
    font:inherit;color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;width:100%;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  label{font-size:var(--t-sm);font-weight:600;color:var(--muted);display:block;margin-bottom:5px}

  /* login */
  .login-card{
    background:var(--panel);border:1px solid var(--line);border-radius:18px;
    box-shadow:0 1px 3px rgba(16,24,40,.04), 0 8px 28px rgba(16,24,40,.06);
    width:100%;max-width:408px;padding:44px 40px 36px;
  }
  .login-head{text-align:center;margin-bottom:30px}
  .login-head .mark{
    width:80px;height:80px;
    display:grid;place-items:center;margin:0 auto 18px;
  }
  .login-head .mark img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .login-head h1{font-size:25px;font-weight:700;margin:0 0 5px;letter-spacing:-.025em;line-height:1.15}
  .login-head p{color:var(--muted);font-size:13.5px;margin:0;letter-spacing:-.005em}
  .field{margin-bottom:14px}
  .err{color:var(--danger);font-size:12.5px;margin:2px 0 12px;font-weight:500}

  /* page */
  .page{padding:28px 0 80px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:14px}
  .page-head h2{font-size:var(--t-2xl);font-weight:700;margin:0 0 4px;letter-spacing:-.03em;line-height:1.15}
  .page-head p{color:var(--muted);font-size:13.5px;margin:0}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .filter{min-width:150px}

  /* student grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;
  }
  .card-head{display:flex;gap:13px;padding:16px 16px 13px;align-items:center}
  .avatar{
    width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;
    background:var(--brand-soft);display:grid;place-items:center;
    color:var(--brand);font-weight:700;font-size:18px;border:1px solid var(--line);
  }
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:10px}
  .card-id{flex:1;min-width:0}
  .card-id h3{margin:0;font-size:15.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-id .cls{
    display:inline-block;margin-top:3px;font-size:11.5px;font-weight:600;
    color:var(--brand);background:var(--brand-soft);padding:2px 8px;border-radius:6px;
  }
  .card-body{padding:0 16px 14px;flex:1}
  .sub-table{width:100%;border-collapse:collapse;font-size:13px}
  .sub-table th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);font-weight:700;padding:6px 8px;border-bottom:1px solid var(--line);
  }
  .sub-table td{padding:7px 8px;border-bottom:1px solid #f1f2f4;vertical-align:top}
  .sub-table tr:last-child td{border-bottom:none}
  .sub-name{font-weight:500}
  .grade-chip{
    display:inline-block;min-width:24px;text-align:center;font-weight:700;font-size:12px;
    padding:1px 7px;border-radius:6px;background:#f1f2f4;color:var(--ink);
  }
  .rmk{color:var(--muted);font-size:12px}
  .empty-sub{color:var(--muted);font-size:12.5px;padding:14px 8px;text-align:center}
  .extra{padding:10px 16px;border-top:1px solid var(--line);background:#fbfbfc}
  .card-foot{display:flex;gap:6px;padding:11px 16px;border-top:1px solid var(--line);background:#fbfbfc}

  .empty-state{
    text-align:center;padding:70px 20px;background:var(--panel);
    border:1px dashed var(--line);border-radius:14px;color:var(--muted);
  }
  .empty-state h3{color:var(--ink);margin:0 0 6px;font-size:17px}
  .empty-state p{margin:0 0 18px;font-size:14px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:40;display:grid;place-items:start center;padding:34px 16px;overflow:auto}
  .modal{background:var(--panel);border-radius:14px;width:100%;max-width:560px;box-shadow:0 20px 48px rgba(16,24,40,.2)}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:var(--t-md);letter-spacing:-.01em}
  .modal-body{padding:20px 22px;max-height:64vh;overflow:auto}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--panel);border-radius:0 0 14px 14px;z-index:2}
  .staff-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .staff-row:last-child{border-bottom:none}
  .staff-av{width:38px;height:38px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .staff-meta{flex:1;min-width:0}
  .staff-name{font-weight:600;font-size:14px}
  .staff-sub{font-size:12px;color:#667085;margin-top:1px}
  .staff-add{background:var(--brand-soft);border-radius:12px;padding:14px;margin-bottom:14px}
  .section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:20px 0 10px}
  .x-btn{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px 6px;border-radius:6px}
  .x-btn:hover{background:#fef3f2;color:var(--danger)}
  .add-line{display:flex;gap:8px;align-items:center;margin-top:6px}
  .photo-pick{display:flex;align-items:center;gap:14px}
  .photo-prev{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--line);background:var(--brand-soft);display:grid;place-items:center;color:var(--brand);font-weight:700}
  .photo-prev img{width:100%;height:100%;object-fit:cover;border-radius:10px}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}
  .stat-bar{display:flex;gap:22px;margin-bottom:22px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 18px;min-width:120px}
  .stat .n{font-size:var(--t-xl);font-weight:700;letter-spacing:-.02em}
  .stat .l{font-size:var(--t-sm);color:var(--muted);font-weight:600;margin-top:1px}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  .config-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:14px 18px;border-radius:10px;margin:24px auto;max-width:680px;font-size:13.5px}
  .config-warn code{background:#fef3c7;padding:1px 5px;border-radius:4px}
  .folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .folder{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;cursor:pointer;transition:.12s;display:flex;flex-direction:column}
  .folder:hover{border-color:#cfd4dc;box-shadow:0 2px 8px rgba(16,24,40,.08)}
  .folder-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .folder-icon{font-size:26px;line-height:1}
  .folder-name{margin:0 0 2px;font-size:var(--t-md);letter-spacing:-.01em}
  .folder-teacher{color:var(--muted);font-size:13px;font-weight:500}
  .badge{font-size:var(--t-xs);font-weight:700;padding:3px 9px;border-radius:var(--r-pill);letter-spacing:.01em}
  .badge-ok{background:#e7f6f1;color:var(--ok)}
  .badge-warn{background:#fef3e7;color:var(--warn)}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .tab{font:inherit;font-weight:600;font-size:13.5px;color:var(--muted);background:none;border:none;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  .badge-danger{background:#fdeceb;color:var(--danger)}
  .att-summary{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .att-date{color:var(--muted);font-size:13px;margin-left:auto}
  .att-table,.fee-table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .att-table th,.fee-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--line);background:#fbfbfc}
  .att-table td,.fee-table td{padding:10px 14px;border-bottom:1px solid #f1f2f4;font-size:13.5px}
  .att-table tr:last-child td,.fee-table tr:last-child td{border-bottom:none}
  .att-name{font-weight:600}
  .att-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .pay-count{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .ledger-row td{background:#fbfcfe;padding:8px 14px}
  .pay-chip{display:inline-block;font-size:11.5px;font-weight:600;color:#1f3a63;background:var(--brand-soft);border-radius:var(--r-pill);padding:3px 10px;margin:2px 6px 2px 0}
  .att-toggle{display:flex;gap:6px}
  .att-btn{font:inherit;font-size:var(--t-sm);font-weight:600;padding:5px 14px;border:1px solid var(--line);background:#fff;border-radius:var(--r-xs);cursor:pointer;color:var(--muted)}
  .att-btn:hover{border-color:#cfd4dc}
  .att-btn.on-present{background:#e7f6f1;border-color:#9cdcc8;color:var(--ok)}
  .att-btn.on-absent{background:#fdeceb;border-color:#f3b6b1;color:var(--danger)}
  .fee-in{width:90px;padding:6px 8px;font-size:13px}
  .bal-due{color:var(--danger);font-weight:600}
  .folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .folder{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;cursor:pointer;transition:.12s;display:flex;flex-direction:column}
  .folder:hover{border-color:#cfd4dc;box-shadow:0 2px 8px rgba(16,24,40,.08)}
  .folder-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .folder-icon{font-size:26px;line-height:1}
  .folder-name{margin:0 0 2px;font-size:16.5px;letter-spacing:-.01em}
  .folder-teacher{color:var(--muted);font-size:13px;font-weight:500}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.01em;display:inline-block}
  .badge-ok{background:#e7f6f1;color:var(--ok)}
  .badge-warn{background:#fef3e7;color:var(--warn)}
  /* ---- additions for v2 report card + 4-role + edit flags ---- */
  .auth-title{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:0 0 22px;text-align:center;color:var(--ink)}
  .role-select{
    width:100%;font:inherit;font-size:14px;color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;cursor:pointer;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%236b7280' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;background-position:right 13px center;
  }
  .role-select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .link-btn{
    background:none;border:none;color:var(--brand);font-weight:600;font-size:13.5px;
    cursor:pointer;padding:0;font-family:inherit;
  }
  .link-btn:hover{text-decoration:underline}
  .auth-switch{font-size:13.5px;color:var(--muted);text-align:center;margin-top:22px}
  /* Login card typography & spacing polish (Apple-inspired) */
  .login-card .field{margin-bottom:17px}
  .login-card label{font-size:12.5px;font-weight:600;color:#4b5563;letter-spacing:.005em;margin-bottom:7px}
  .login-card input,.login-card .role-select{
    padding:12px 13px;border-radius:10px;font-size:16px;letter-spacing:-.003em;
  }
  .login-card input::placeholder{color:#9aa1ad}
  .login-card .row-2{gap:12px}
  .login-card .btn-block{margin-top:6px;padding:13px 16px;font-size:14.5px;font-weight:600;border-radius:10px;letter-spacing:-.003em}
  .login-card .hint{margin-top:6px;font-size:12px;color:var(--muted)}
  .ok{color:#067647;font-size:12.5px;margin:2px 0 12px;font-weight:500}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:420px){.row-2{grid-template-columns:1fr}}
  .modal-wide{max-width:760px}
  /* Desktop: table-like grid. Head labels + each row's .sf field cells align
     to the same 7 columns. Per-field labels (.sf-lbl) are hidden on desktop
     because the head row already labels the columns. */
  .sub-grid{display:grid;grid-template-columns:1.6fr .7fr .7fr .7fr .7fr 1.4fr 90px;gap:6px;align-items:center;margin-bottom:6px}
  .sub-grid input{width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:var(--r-xs);font-size:13px}
  .sub-grid input.ro{background:#f3f4f6;color:#374151;font-weight:600;text-align:center}
  .sub-grid-head label{margin:0;font-size:11px;color:var(--muted);font-weight:600}
  .sub-row .sf{display:contents}          /* field wrappers vanish so inputs sit directly in the grid */
  .sub-row .sf-lbl{display:none}          /* column headers already shown in head row */
  .sub-row .sub-actions{display:flex;flex-direction:column;gap:4px;align-items:stretch}
  .sub-row .x-btn{font-size:12px;font-weight:600;padding:6px 8px;border:1px solid var(--line);border-radius:7px;color:var(--muted);white-space:nowrap}
  .sub-row .x-btn:hover{background:#fef3f2;color:var(--danger);border-color:#f0c9c4}
  .sub-row .sub-save{padding:6px 8px;font-size:12px;white-space:nowrap}
  .sub-scroll{width:100%}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  @media(max-width:560px){.meta-grid{grid-template-columns:1fr}}
  .meta-field-actions{display:flex;gap:6px;margin-top:5px;margin-bottom:2px}
  .meta-field-actions .btn-sm{flex:0 0 auto}
  .meta-field-actions .x-btn{padding:5px 10px;font-size:12px;border:1px solid var(--border,#e2e8f0);border-radius:6px;background:#fff;color:#b91c1c;cursor:pointer}
  .meta-field-actions .x-btn:active{background:#fef2f2}
  .meta-field-actions button:disabled{opacity:.6;cursor:default}
  .card-total{display:inline-block;font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .edit-flag{display:flex;justify-content:space-between;align-items:center;gap:14px;background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;padding:12px 14px;border-radius:10px;margin-bottom:18px;font-size:13px}
  .edit-flag .flag-item{display:inline-block;margin-right:10px;opacity:.9}
  .folder-actions{display:flex;gap:6px;margin-top:10px}
  .login-wrap{
    min-height:100vh;min-height:100svh;min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 24px 24px;
  }

  /* school settings: header actions + setup prompt */
  .head-actions{display:flex;gap:10px;align-items:center}
  /* On phones the two header buttons sit on one row, sharing the width, rather
     than stacking. The primary "Add class folder" takes the larger share. */
  @media(max-width:560px){
    /* Buttons size to their text and group to the right — no full-width stretch. */
    .head-actions{width:100%;gap:8px;justify-content:center;flex-wrap:wrap}
    .head-actions .btn{flex:0 0 auto;min-height:42px;padding:9px 16px;font-size:13px;white-space:nowrap;border-radius:var(--r-md)}
  }
  .setup-flag{display:flex;justify-content:space-between;align-items:center;gap:14px;background:#eef3fb;border:1px solid #c9d4ea;color:#1f3a63;padding:12px 14px;border-radius:10px;margin-bottom:18px;font-size:13px}

  /* School header band (owner, inside a school / Level 2) */
  .school-band{margin-bottom:20px}
  .back-link{background:none;border:none;color:var(--brand);font-size:13px;font-weight:600;cursor:pointer;padding:4px 0;margin-bottom:8px;letter-spacing:-.01em}
  .back-link:hover{text-decoration:underline}
  .school-band-main{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
  .school-band-name{font-size:20px;font-weight:700;letter-spacing:-.02em;margin:0}
  .school-band-head{font-size:13px;color:var(--muted);margin-top:3px;font-weight:500}
  .school-band-head.warn{color:#a1620a;font-weight:600}
  .locked-branch{padding:11px 12px;background:var(--bg);border:1px solid var(--line);border-radius:10px;font-size:14px;font-weight:600;color:var(--ink)}

  /* ---------- Mobile app shell ----------
     Below 720px the site becomes an app: hero card, list rows,
     bottom tab bar, and a profile sheet. Desktop is untouched. */

  /* Shared pieces (hidden on desktop) */
  .avatar-btn{display:none}
  .bottom-nav{display:none}
  .home-hero{display:none}

  .folder-icon{display:grid;place-items:center;line-height:1}
  .stat{flex:1;min-width:0}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;flex-shrink:0}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{transition:none!important;animation:none!important}
  }

  /* Bottom sheet (used by the mobile menu) */
  .sheet-overlay{position:fixed;inset:0;background:rgba(16,24,40,.5);z-index:60;display:flex;align-items:flex-end}
  .sheet{
    background:#fff;width:100%;border-radius:22px 22px 0 0;
    padding:10px 20px calc(22px + env(safe-area-inset-bottom));
    box-shadow:0 -12px 40px rgba(16,24,40,.22);
    animation:sheetUp .24s cubic-bezier(.32,.72,.28,1);
    touch-action:none;
  }
  @keyframes sheetUp{from{transform:translateY(40%);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet-handle{width:38px;height:4px;border-radius:99px;background:#d7dae0;margin:4px auto 16px}
  .sheet-id{display:flex;align-items:center;gap:13px;padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:8px}
  .sheet-avatar{
    width:46px;height:46px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--brand),#16346e);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:18px;
  }
  .sheet-name{font-weight:700;font-size:16px;letter-spacing:-.01em}
  .sheet-role{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:1px}
  .sheet-section{padding:12px 0 4px}
  .sheet-section label{margin-bottom:7px}
  .sheet-row{
    display:flex;justify-content:space-between;align-items:center;width:100%;
    font:inherit;font-weight:600;font-size:15px;color:var(--ink);
    background:none;border:none;border-bottom:1px solid var(--line);
    padding:16px 2px;cursor:pointer;text-align:left;
  }
  .sheet-row:last-child{border-bottom:none}
  .sheet-chev{color:#b6bcc6;font-size:20px;line-height:1}
  .sheet-danger{color:var(--danger)}

  @media(max-width:720px){
    /* --- Header: brand + avatar only --- */
    .topbar{background:rgba(255,255,255,.94)}
    .topbar .wrap{min-height:56px;padding-top:8px;padding-bottom:8px;flex-wrap:nowrap}
    .topbar-controls{display:none}
    .avatar-btn{
      display:grid;place-items:center;width:36px;height:36px;border-radius:50%;
      border:none;cursor:pointer;flex-shrink:0;
      background:linear-gradient(135deg,var(--brand),#16346e);color:#fff;
      font:inherit;font-weight:700;font-size:14.5px;
      box-shadow:0 1px 3px rgba(31,78,163,.35);
    }
    .brand{font-size:15px;flex:1;min-width:0}
    .brand>div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand .mark{width:32px;height:32px;flex-shrink:0}
    .brand small{display:none}

    /* --- Hero card: the school pulse (compact) --- */
    .home-hero{
      display:block;
      background:linear-gradient(135deg,#255bb8 0%,var(--brand) 42%,#16346e 100%);
      border-radius:var(--card-radius);padding:var(--card-pad);margin:0 0 var(--card-gap);
      color:#fff;box-shadow:0 4px 14px rgba(31,78,163,.20);
    }
    .hero-greet{font-size:18px;font-weight:700;letter-spacing:-.02em}
    .hero-sub{font-size:11.5px;color:rgba(255,255,255,.75);margin-top:2px;font-weight:500}
    .hero-stats{display:grid;grid-template-columns:1fr 1fr 1fr;margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.18)}
    .hero-stat{text-align:left}
    .hero-stat+.hero-stat{border-left:1px solid rgba(255,255,255,.18);padding-left:12px}
    .hero-stat .hn{font-size:19px;font-weight:700;letter-spacing:-.02em}
    .hero-stat .hl{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.72);margin-top:1px;text-transform:uppercase;letter-spacing:.05em}

    /* Hero replaces the desktop page furniture — on the home screen only.
       FolderView's own .page-head (class title + Add student/Submit) stays. */
    .home-hero~.page-head{display:none}
    .home-hero~.stat-bar{display:none}
    /* Action buttons hug their text and group to the right, rather than
       stretching full-width. */
    .toolbar{width:100%;gap:8px;justify-content:center;flex-wrap:wrap}
    .toolbar .btn{flex:0 0 auto;min-height:40px;border-radius:var(--r-md);font-size:13px;padding:9px 16px}
    .setup-flag{flex-direction:column;align-items:stretch;text-align:left}
    .school-band{margin-bottom:var(--card-gap)}
    .school-band-main{padding:13px 14px;border-radius:var(--card-radius)}
    .school-band-name{font-size:18px}
    .school-band-head{font-size:12px}

    /* Folder-view header (class title + back link) compacted.
       Heading sits on top; the two action buttons share a full-width row below. */
    .back-link{font-size:12.5px;margin-bottom:8px}
    .page-head{margin-bottom:14px;gap:10px;flex-direction:column;align-items:center;text-align:center}
    .page-head>div:first-child{width:100%}
    .page-head h2{font-size:19px}
    .page-head p{font-size:12px}
    /* Tabs slimmer */
    .tabs{gap:2px;margin-bottom:14px}
    .tab{font-size:12.5px;padding:8px 13px}

    /* --- Classes as list rows (compact media rows) --- */
    .folder-grid{display:flex;flex-direction:column;gap:7px}
    .folder{
      display:grid;grid-template-columns:38px minmax(0,1fr) auto;grid-template-rows:auto auto auto;
      column-gap:10px;row-gap:0;align-items:center;
      padding:10px 11px;border-radius:var(--r-lg);box-shadow:0 1px 2px rgba(16,24,40,.05);
      max-width:100%;
    }
    .folder>*{min-width:0}
    .folder:active{transform:scale(.98);transition:.1s}
    .folder-top{display:contents}
    .folder-icon{
      grid-row:1/4;grid-column:1;
      width:38px;height:38px;border-radius:var(--r-md);background:var(--brand-soft);
    }
    .folder-icon svg{width:20px;height:20px}
    .folder-name{grid-row:1;grid-column:2;font-size:14px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
    .folder-teacher{grid-row:2;grid-column:2;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .folder-count{grid-row:3;grid-column:2;font-size:11px;color:var(--muted)}
    .folder .badge{grid-row:1;grid-column:3;justify-self:end;font-size:9px;padding:2px 7px;white-space:nowrap}
    .folder-actions{grid-row:2/4;grid-column:3;justify-self:end;align-self:end;display:flex;gap:4px;margin:0}
    .folder-actions .btn-sm{min-height:27px;padding:3px 9px;font-size:11px;border-radius:var(--r-xs)}

    /* --- School picker cards: taller than class rows, longer text ---
       The school name, a "Headmaster: <name>" line, and a class/student count
       stack in the middle; the status chip sits top-right and is allowed to
       shrink so it can never run off the screen edge. */
    .school-card{
      grid-template-columns:40px minmax(0,1fr) auto;
      grid-template-rows:auto auto auto;
      padding:11px 12px;column-gap:11px;row-gap:1px;align-items:start;
      border-radius:var(--card-radius);
    }
    .school-card .folder-icon{grid-row:1/4;align-self:center;width:40px;height:40px;border-radius:12px}
    .school-card .folder-icon svg{width:22px;height:22px}
    .school-card .folder-name{grid-row:1;grid-column:2;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .school-card .badge{
      grid-row:1;grid-column:3;justify-self:end;align-self:start;
      font-size:9px;padding:2px 7px;white-space:nowrap;flex-shrink:0;
    }
    .school-card .folder-teacher{
      grid-row:2;grid-column:2/4;font-size:11.5px;color:var(--muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;
    }
    .school-card .folder-count{grid-row:3;grid-column:2/4;font-size:11px;color:var(--muted);margin-top:1px}

    /* --- Bottom tab bar --- */
    .bottom-nav{
      display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;
      background:rgba(255,255,255,.94);
      -webkit-backdrop-filter:saturate(180%) blur(14px);
      backdrop-filter:saturate(180%) blur(14px);
      border-top:1px solid var(--line);
      padding:6px 8px calc(6px + env(safe-area-inset-bottom));
      justify-content:space-around;align-items:center;
    }
    .nav-item{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      font:inherit;font-size:10.5px;font-weight:600;color:var(--muted);
      background:none;border:none;cursor:pointer;padding:6px 18px;border-radius:12px;
    }
    .nav-item.active{color:var(--brand)}
    .nav-add{
      width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
      background:linear-gradient(135deg,#255bb8,var(--brand));color:#fff;
      display:grid;place-items:center;margin-top:-22px;
      box-shadow:0 6px 16px rgba(31,78,163,.4),0 0 0 4px var(--bg);
    }
    .nav-add:active{transform:scale(.94)}

    /* --- General mobile refinement --- */
    .wrap{padding:0 14px;max-width:100%}
    .edit-flag,.setup-flag{overflow-wrap:anywhere}
    .page{padding:14px 0 106px}
    .page-head h2{font-size:20px}
    .btn{min-height:38px}
    .btn-sm{min-height:32px}
    input,select,textarea{font-size:16px}

    /* --- Tables fit the screen: no sideways scrolling --- */
    .att-table,.fee-table{font-size:12.5px;table-layout:auto;width:100%}
    .att-table th,.fee-table th{padding:9px 6px;font-size:9.5px;letter-spacing:.03em}
    .att-table td,.fee-table td{padding:9px 6px;font-size:12.5px;white-space:nowrap}
    .att-table td:first-child,.fee-table td:first-child{white-space:normal;overflow-wrap:anywhere;font-size:12.5px;padding-right:4px}
    .fee-table .col-status{display:none} /* red balance already signals unpaid */
    .fee-table .btn-sm{padding:4px 8px;font-size:11px;min-height:28px}
    .fee-in{width:56px;padding:5px 5px;font-size:14px}
    .att-btn{padding:5px 9px;font-size:11.5px}
    .att-toggle{gap:4px}
    .att-summary{flex-wrap:wrap;gap:6px}
    .att-date{font-size:11.5px}
    .fee-table .badge{font-size:9.5px;padding:2px 6px}

    /* Marks table inside student cards: slightly denser */
    .sub-table th{padding:5px 4px;font-size:9px}
    .sub-table td{padding:6px 4px;font-size:12px}

    /* ---- Score entry as stacked cards (no horizontal scroll) ----
       Each subject becomes one self-contained card. Fields flow top-to-bottom
       with their own labels, so a teacher fills it like a paper form. The
       score inputs sit two-per-row; subject and remarks get full width. */
    .sub-scroll{overflow:visible;margin:0}
    .sub-grid-head{display:none}                 /* column headers not needed; each field is labelled */
    .sub-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px 10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:13px 13px 12px;
      margin-bottom:12px;
      box-shadow:0 1px 2px rgba(16,24,40,.05);
      align-items:end;
    }
    .sub-row .sf{display:flex;flex-direction:column;gap:4px;min-width:0}
    .sub-row .sf-lbl{
      display:block;font-size:11.5px;font-weight:600;color:var(--muted);
      letter-spacing:.01em;
    }
    .sub-row .sf input{
      width:100%;padding:11px 12px;font-size:16px;
      border:1px solid var(--line);border-radius:10px;background:#fff;
    }
    .sub-row .sf input.ro{background:#f3f4f6;color:#374151;font-weight:700;text-align:center}
    /* Full-width fields */
    .sub-row .sf-subject,
    .sub-row .sf-remarks{grid-column:1 / -1}
    /* Total is read-only and derived — show it smaller, paired with Grade */
    .sub-row .sf-class{grid-column:1}
    .sub-row .sf-exam{grid-column:2}
    .sub-row .sf-total{grid-column:1}
    .sub-row .sf-grade{grid-column:2}
    /* Action row: Remove (left) + Save (right), full width at card bottom */
    .sub-row .sub-actions{
      grid-column:1 / -1;display:flex;flex-direction:row;gap:8px;margin-top:4px;
    }
    .sub-row .sub-actions .x-btn{
      flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
      min-height:42px;padding:0 12px;
      background:#fff;color:#b42318;border:1px solid #f0c9c4;border-radius:10px;
      font-size:13px;font-weight:600;cursor:pointer;
    }
    .sub-row .sub-actions .x-btn:active{background:#fef2f2}
    .sub-row .sub-actions .sub-save{
      flex:1.4;min-height:42px;border-radius:10px;font-size:13px;
    }

    /* --- Login fits one screen: no scrolling to reach Create account --- */
    .login-wrap{padding:0 20px 10px;justify-content:flex-start}
    .login-card{padding:6px 4px 10px;border-radius:0;border:none;box-shadow:none;background:transparent;max-width:420px}
    .login-head{margin-bottom:12px}
    .login-head .mark{width:54px;height:54px;margin:0 auto 8px}
    .login-head h1{font-size:19px;margin:0 0 2px}
    .login-head p{font-size:12px}
    .auth-title{font-size:16px;margin:0 0 12px}
    .login-card .field{margin-bottom:10px}
    .login-card label{font-size:12px;margin-bottom:4px}
    .login-card input,.login-card .role-select{padding:10px 12px;border-radius:10px}
    .login-card .btn-block{margin-top:2px;padding:12px 16px;min-height:46px}
    .login-card .hint{font-size:11px;margin-top:3px}
    .auth-switch{margin-top:12px;font-size:13px}
    .login-wrap,.login-card{width:100%}
    .login-wrap{background:var(--panel)}
    .overlay{padding:0;align-items:flex-end;display:flex}
    .modal{border-radius:22px 22px 0 0;max-width:none;animation:sheetUp .24s cubic-bezier(.32,.72,.28,1)}
    .modal-body{max-height:62vh;padding:16px 18px}
    .modal-head{padding:15px 18px}
    .modal-foot{padding:13px 18px calc(13px + env(safe-area-inset-bottom))}
    .modal-foot .btn{min-height:44px;flex:1;border-radius:12px}
  }

</style>
</head>

<div id="root"></div>

function buildReportHTML(student, folder, ranks, numberOnRoll, school) {
  const SCH = school || DEFAULT_SCHOOL;

    const avg = (num(r.class_score) + num(r.exam_score)) / 2;
    const g = hasScore ? gradeFor(avg) : (/^[1-6]$/.test(String(r.grade || "")) ? r.grade : "");
    return `<tr>
      <td class="sname">${r.subject || ""}</td>
      <td>${r.class_score ?? ""}</td>
      <td>${r.exam_score ?? ""}</td>
      <td>${r.marks ?? ""}</td>
      <td>${g}</td>

function printReportCard(student, folder, ranks, numberOnRoll, school) {
  const html = buildReportHTML(student, folder, ranks, numberOnRoll, school);
  const w = window.open("", "_blank");
  if (!w) {
    alert("Please allow pop-ups to open the report card.");
    return;
  }
  w.document.write(html);
  w.document.close();
}
